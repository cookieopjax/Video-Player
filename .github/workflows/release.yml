name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
            dist/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-win
          path: dist-win

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist-mac

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          mapfile -t files < <(find dist-win dist-mac -type f | sort)
          if [ ${#files[@]} -eq 0 ]; then echo "No files found"; exit 1; fi
          gh release create "$tag" \
            --title "VideoPlayer $tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            "${files[@]}"
