<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; media-src 'self' blob: file:; style-src 'self' 'unsafe-inline'">
  <title>Video Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Custom title bar -->
  <div id="app-titlebar">
    <div id="app-titlebar-left">
      <svg width="14" height="14" viewBox="0 0 256 256" fill="none">
        <circle cx="128" cy="128" r="118" stroke="#34d399" stroke-width="16"/>
        <polygon points="100,80 196,128 100,176" fill="#34d399"/>
      </svg>
      <span>Video Player</span>
    </div>
    <div id="win-controls">
      <button id="btn-minimize" title="最小化">
        <svg width="10" height="2" viewBox="0 0 10 2"><line x1="0" y1="1" x2="10" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button id="btn-maximize" title="最大化">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.75" y="0.75" width="8.5" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button id="btn-close" title="關閉">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Drop overlay -->
  <div id="drop-overlay">
    <div id="drop-message">拖拉影片到這裡</div>
  </div>

  <!-- Video + overlays container -->
  <div id="video-container">
    <video id="video"></video>

    <!-- Loading spinner -->
    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
    </div>

    <!-- Play/pause animation flash -->
    <div id="playpause-anim">
      <svg id="anim-svg" width="36" height="36" viewBox="0 0 24 24" fill="white"></svg>
    </div>

    <!-- Crop overlay canvas -->
    <canvas id="crop-canvas"></canvas>
  </div>

  <div id="controls">

    <div id="title-bar">
      <span id="filename">尚未開啟影片</span>
      <span id="time-display">00:00 / 00:00</span>
    </div>

    <div id="progress-wrap">
      <div id="progress-track">
        <div id="progress-fill"></div>
        <div id="progress-thumb"></div>
      </div>
    </div>

    <div id="btn-row">

      <div id="controls-left">
        <button id="btn-open" class="btn btn-icon" title="開啟檔案">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button id="btn-screenshot" class="btn btn-icon" title="截圖並裁切 (S)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>

      <div id="controls-center">
        <button id="btn-backward" class="btn btn-jump" title="後退 (←)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
          <span id="label-backward">10s</span>
        </button>

        <button id="btn-playpause" class="btn btn-play" title="播放/暫停 (Space)">
          <svg id="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="icon-pause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>

        <button id="btn-forward" class="btn btn-jump" title="前進 (→)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/></svg>
          <span id="label-forward">10s</span>
        </button>
      </div>

      <div id="controls-right">
        <div id="volume-wrap">
          <span id="vol-icon">&#128266;</span>
          <div id="vol-track">
            <div id="vol-fill"></div>
            <div id="vol-thumb"></div>
          </div>
          <span id="vol-label">70%</span>
        </div>

        <div id="speed-wrap">
          <button id="btn-speed" class="btn btn-speed">1.0x &#9662;</button>
          <div id="speed-dropdown" class="hidden"></div>
        </div>

        <button id="btn-settings" class="btn btn-icon" title="設定">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="btn-fullscreen" class="btn btn-icon" title="全螢幕 (F)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div id="settings-header">
        <span>設定</span>
        <button id="btn-settings-close">
          <svg width="12" height="12" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="settings-section">
        <div class="settings-label">播放速度選項</div>
        <div id="speed-chips"></div>
        <div class="settings-add-row">
          <input id="speed-input" type="number" min="0.1" max="10" step="0.25" placeholder="新增速度…">
          <button id="btn-add-speed" class="btn">新增</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">跳躍秒數</div>
        <input id="jump-input" type="number" min="1" max="300" step="1" class="settings-text-input">
      </div>

      <div class="settings-section">
        <div class="settings-label">預設音量 <span id="vol-default-label">70%</span></div>
        <input id="vol-default-input" type="range" min="0" max="100" step="1" class="settings-range">
      </div>

      <div id="settings-footer">
        <button id="btn-settings-save" class="btn btn-save">儲存</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script src="utils.js"></script>
  <script src="player.js"></script>
</body>
</html>
