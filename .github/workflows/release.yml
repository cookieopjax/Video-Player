name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: List build output
        shell: bash
        run: find dist -maxdepth 1 \( -name "*.exe" -o -name "*.yml" \) | sort

      - name: Create GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          mapfile -t exes < <(find dist -maxdepth 1 -name "*.exe" | sort)
          mapfile -t ymls < <(find dist -maxdepth 1 -name "*.yml" | sort)
          if [ ${#exes[@]} -eq 0 ]; then echo "No exe files found"; exit 1; fi
          gh release create "$tag" \
            --title "VideoPlayer $tag" \
            --generate-notes \
            "${exes[@]}" "${ymls[@]}"
